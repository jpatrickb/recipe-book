<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — Patrick's Recipe Book</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="container">
      <a class="site-logo" href="index.html" aria-label="Patrick's Recipe Book home">
        <span class="site-logo-icon">📖</span>
        <span class="site-logo-text">Patrick's <span>Recipe Book</span></span>
      </a>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content">
    <div class="container" id="recipe-content">

      <!-- Back button -->
      <nav class="back-nav" aria-label="Breadcrumb">
        <a class="back-btn" href="index.html">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M10 12L6 8l4-4"/>
          </svg>
          All Recipes
        </a>
      </nav>

      <!-- Recipe Hero -->
      <section class="recipe-hero" aria-label="Recipe overview">
        <div id="hero-visual" class="hero-visual">
          <!-- Populated by JS -->
        </div>

        <h1 id="recipe-title" class="recipe-title">Loading…</h1>

        <div class="recipe-meta">
          <span id="recipe-badge" class="badge"></span>
          <span id="recipe-serves" class="serves-badge"></span>
        </div>

        <div id="recipe-tags" class="recipe-tags">
          <!-- Tags injected by JS -->
        </div>
      </section>

      <!-- Action Buttons -->
      <div class="recipe-actions no-print">
        <button id="check-reset" class="btn btn-outline" aria-label="Uncheck all ingredients">
          <span aria-hidden="true">↺</span> Reset checklist
        </button>
        <button class="btn btn-outline" onclick="window.print()" aria-label="Print this recipe">
          <span aria-hidden="true">🖨</span> Print
        </button>
      </div>

      <!-- Recipe Body: Ingredients + Instructions -->
      <div class="recipe-body">

        <!-- Ingredients -->
        <aside class="ingredients-panel" aria-label="Ingredients">
          <h2 class="panel-title">Ingredients</h2>
          <div id="ingredients-container">
            <!-- Populated by JS -->
          </div>
        </aside>

        <!-- Instructions -->
        <article aria-label="Instructions">
          <h2 class="panel-title">Instructions</h2>
          <ol id="instructions-list" class="instructions-list" aria-label="Step-by-step instructions">
            <!-- Populated by JS -->
          </ol>

          <!-- Notes (hidden until populated) -->
          <div id="recipe-notes" class="recipe-notes" hidden>
            <p class="notes-title">💡 Notes</p>
            <ul id="notes-list" class="notes-list"></ul>
          </div>
        </article>

      </div>

      <!-- Related Recipes (hidden until populated) -->
      <section id="related-section" class="related-section" hidden aria-label="Related recipes">
        <h2 class="related-title">You might also need</h2>
        <div id="related-grid" class="related-grid">
          <!-- Populated by JS -->
        </div>
      </section>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="container">
      <p><strong>Patrick's Recipe Book</strong> — family recipes, collected with love.</p>
    </div>
  </footer>

  <script src="js/recipe.js"></script>
</body>
</html>
